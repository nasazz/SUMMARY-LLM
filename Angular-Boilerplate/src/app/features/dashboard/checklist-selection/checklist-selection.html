<div class="min-h-screen bg-slate-50 dark:bg-slate-950 p-6 lg:p-12 transition-colors duration-300">

    <!-- Header -->
    <div
        class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row items-start md:items-center justify-between gap-4 animate-in fade-in slide-in-from-top-4 duration-700">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight">Dashboard</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-1">Manage your checklists and tasks.</p>
        </div>
    </div>

    <!-- Grid Layout -->
    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

        <!-- Card 1: Create New Checklist -->
        <div (click)="createNewChecklist()"
            class="group cursor-pointer relative flex flex-col items-center justify-center p-8 h-64 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-2xl bg-slate-50 dark:bg-slate-900/50 hover:bg-white dark:hover:bg-slate-900 hover:border-blue-500 dark:hover:border-blue-500 hover:shadow-xl hover:shadow-blue-500/10 transition-all duration-300 animate-in zoom-in-95 duration-500">

            <div
                class="w-16 h-16 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center mb-4 group-hover:scale-110 group-hover:bg-blue-600 transition-all duration-300">
                <i
                    class="pi pi-plus text-2xl text-blue-600 dark:text-blue-400 group-hover:text-white transition-colors duration-300"></i>
            </div>

            <h3
                class="text-lg font-bold text-slate-700 dark:text-slate-200 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                New Checklist</h3>
            <p
                class="text-sm text-slate-500 dark:text-slate-500 text-center mt-2 group-hover:text-slate-600 dark:group-hover:text-slate-400 transition-colors">
                Start a new inspection or task list</p>
        </div>

        <!-- Existing Checklists Loop -->
        @for (checklist of checklists(); track checklist.id) {
        <div class="group relative flex flex-col p-6 h-64 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm hover:shadow-xl hover:shadow-slate-200/50 dark:hover:shadow-black/50 hover:-translate-y-1 transition-all duration-300 animate-in zoom-in-95 duration-500"
            style="animation-delay: 100ms;">

            <!-- Top Actions -->
            <div class="flex items-start justify-between mb-4">
                <div
                    class="px-3 py-1 rounded-full text-xs font-medium bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 border border-blue-100 dark:border-blue-800">
                    {{ checklist.status }}
                </div>
                <button pButton icon="pi pi-ellipsis-h"
                    class="p-button-text p-button-rounded !w-8 !h-8 !text-slate-400 hover:!text-slate-600 dark:hover:!text-slate-300"
                    (click)="$event.stopPropagation(); menu.toggle($event)"></button>
                <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>
            </div>

            <!-- Content -->
            <div class="flex-1">
                <h3
                    class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-2 truncate group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                    {{ checklist.title }}
                </h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 line-clamp-2 leading-relaxed">
                    {{ checklist.description }}
                </p>
            </div>

            <!-- Footer -->
            <div class="pt-4 mt-2 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between">
                <span class="text-xs text-slate-400 flex items-center gap-1">
                    <i class="pi pi-clock text-[10px]"></i> {{ checklist.lastUpdated }}
                </span>
                <button (click)="continueChecklist(checklist.id)"
                    class="text-sm font-semibold text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 flex items-center gap-1 group/btn">
                    Continue <i
                        class="pi pi-arrow-right text-xs transform group-hover/btn:translate-x-1 transition-transform"></i>
                </button>
            </div>
        </div>
        }

    </div>
</div>
