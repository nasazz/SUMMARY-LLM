<header class="h-20 flex items-center justify-between px-8 bg-transparent transition-all duration-300">

    <!-- Left: Context / Breadcrumb / Title -->
    <div class="flex items-center gap-5">
        <button (click)="toggleSidebar.emit()"
            class="p-2.5 -ml-2.5 rounded-xl text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-purple-600 transition-all duration-200 group">
            <i class="pi pi-align-left text-xl group-hover:scale-110 transition-transform"
                [class.rotate-180]="isSidebarCollapsed()"></i>
        </button>

        <!-- Dynamic Page Title (Static for now) -->
        <div class="flex flex-col">
            <h1 class="text-xl font-bold text-slate-800 dark:text-white tracking-tight">Dashboard</h1>
            <span class="text-xs font-medium text-slate-400">Welcome back, {{ store.user()?.fullName?.split(' ')?.[0]
                }}</span>
        </div>
    </div>

    <!-- Right: Actions -->
    <div class="flex items-center gap-4">

        <!-- Search Bar (Pill) -->
        <div
            class="hidden md:flex items-center bg-white dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 rounded-full px-5 py-2.5 focus-within:ring-2 focus-within:ring-purpled-500/50 shadow-sm transition-all w-80">
            <i class="pi pi-search text-slate-400 text-lg"></i>
            <input type="text" placeholder="Search for projects..."
                class="bg-transparent border-none focus:outline-none text-sm ml-3 w-full text-slate-700 dark:text-slate-200 placeholder:text-slate-400 font-medium" />
        </div>

        <!-- Notification Bell -->
        <button
            class="w-11 h-11 rounded-full bg-white dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 flex items-center justify-center text-slate-500 hover:text-purpled-600 hover:ring-purpled-200 hover:shadow-lg hover:shadow-purpled-500/10 transition-all relative group">
            <i class="pi pi-bell text-xl group-hover:swing"></i>
            <span
                class="absolute top-2.5 right-3 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-slate-800"></span>
        </button>

        <div class="h-8 w-px bg-slate-200 dark:bg-slate-700 mx-1 hidden md:block"></div>

        <!-- User Profile -->
        <div #userTrigger class="flex items-center gap-3 cursor-pointer select-none pl-1"
            (click)="op.toggle($event, userTrigger)">
            <div
                class="w-11 h-11 rounded-full bg-gradient-to-tr from-purpled-100 to-teal-50 dark:from-purpled-900 dark:to-teal-900 p-0.5 ring-2 ring-transparent hover:ring-purpled-200 transition-all">
                <img [src]="'https://ui-avatars.com/api/?name=' + (store.user()?.fullName || 'User') + '&background=10b981&color=fff'"
                    alt="Avatar"
                    class="w-full h-full rounded-full object-cover border border-white dark:border-slate-800" />
            </div>
        </div>

        <!-- Popover -->
        <p-popover #op (onShow)="isUserMenuOpen.set(true)" (onHide)="isUserMenuOpen.set(false)" [appendTo]="'body'"
            [style]="{width: '260px', 'margin-top': '16px', 'border-radius': '16px', 'border': 'none', 'box-shadow': '0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1)'}"
            styleClass="user-profile-popover overflow-hidden">

            <div class="p-4 bg-slate-50 dark:bg-slate-800/50 border-b border-slate-100 dark:border-slate-800">
                <p class="font-bold text-slate-800 dark:text-white truncate">{{ store.user()?.fullName }}</p>
                <p class="text-xs font-medium text-purpled-600 truncate">{{ store.user()?.email }}</p>
            </div>

            <div class="p-2 flex flex-col gap-1">
                <button routerLink="/app/profile" (click)="op.hide()"
                    class="text-left px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl text-slate-600 dark:text-slate-300 hover:text-purpled-600 flex items-center gap-3 transition-colors font-medium text-sm">
                    <i class="pi pi-user text-lg opacity-70"></i>
                    <span>Profile</span>
                </button>

                @if (store.user()?.role === 'Admin') {
                <button routerLink="/app/settings" (click)="op.hide()"
                    class="text-left px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl text-slate-600 dark:text-slate-300 hover:text-purpled-600 flex items-center gap-3 transition-colors font-medium text-sm">
                    <i class="pi pi-cog text-lg opacity-70"></i>
                    <span>Settings</span>
                </button>
                }

                <div class="h-px bg-slate-100 dark:bg-slate-800 my-1 mx-2"></div>

                <button (click)="store.logout(); op.hide()"
                    class="text-left px-4 py-3 hover:bg-red-50 dark:hover:bg-red-900/10 rounded-xl text-red-500 flex items-center gap-3 transition-colors font-medium text-sm">
                    <i class="pi pi-sign-out text-lg"></i>
                    <span>Sign Out</span>
                </button>
            </div>
        </p-popover>

    </div>
</header>
