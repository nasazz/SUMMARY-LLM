<div class="h-full flex flex-col bg-white dark:bg-slate-950 border-r border-slate-100 dark:border-slate-800 transition-all duration-300 shadow-[4px_0_24px_-12px_rgba(0,0,0,0.1)] z-20"
    [class.w-[280px]]="!isCollapsed()" [class.w-[80px]]="isCollapsed()">

    <!-- Logo Area -->
    <div class="h-24 flex items-center gap-4 px-8 mb-2" [class.justify-center]="isCollapsed()"
        [class.px-0]="isCollapsed()">
         <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-violet-500/30">
          <i class="pi pi-file-edit text-white text-base"></i>
        </div>

        @if (!isCollapsed()) {
        <div class="flex flex-col animate-in fade-in slide-in-from-left-4 duration-300">
            <span
                class="font-extrabold text-xl tracking-tight text-slate-900 dark:text-white leading-none">SummaryGen</span>
            <span
                class="text-[10px] font-medium text-purple-600 dark:text-purple-400 uppercase tracking-widest mt-0.5">Workspace</span>
        </div>
        }
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-4 py-4 space-y-8 overflow-y-auto custom-scrollbar overflow-x-hidden">

        <!-- Group: Main -->
        <div class="space-y-1.5">
            @if (!isCollapsed()) {
            <div class="px-4 mb-3">
                <span class="text-xs font-bold text-slate-400/80 uppercase tracking-widest">Dashboards</span>
            </div>
            }

            <a routerLink="/app/checklist-selection"
                routerLinkActive="!bg-purple-50/80 !text-purple-700 dark:!bg-purple-500/10 dark:!text-purple-400 shadow-sm ring-1 ring-purple-100 dark:ring-purple-500/20"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 hover:text-slate-900 dark:hover:text-slate-200 transition-all duration-200 group relative overflow-hidden"
                [class.justify-center]="isCollapsed()">
                <i class="pi pi-objects-column text-xl transition-colors group-hover:text-purple-500"
                    pTooltip="Projects" [tooltipDisabled]="!isCollapsed()" tooltipPosition="right"></i>
                @if (!isCollapsed()) {
                <span class="font-semibold text-sm tracking-wide">Projects</span>
                }
            </a>

        </div>

        <!-- Group: Management -->
        @if (store.user()?.role === 'Admin') {
        <div class="space-y-1.5">
            @if (!isCollapsed()) {
            <div class="px-4 mb-3 mt-2">
                <span class="text-xs font-bold text-slate-400/80 uppercase tracking-widest">Management</span>
            </div>
            }


        </div>
        }

    </nav>

    <!-- Footer: Profile Card -->
    <div class="p-4 mx-2 mb-2">
        <div class="relative overflow-hidden rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-3 flex items-center gap-3.5 hover:border-purple-200 dark:hover:border-purple-800 transition-colors cursor-pointer group"
            [class.justify-center]="isCollapsed()">

            <!-- Avatar -->
            <div
                class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center shadow-sm border border-slate-100 dark:border-slate-700 flex-none relative z-10">
                <img [src]="'https://ui-avatars.com/api/?name=' + (store.user()?.fullName || 'U') + '&background=10b981&color=fff'"
                    alt="User" class="w-full h-full rounded-full object-cover">
            </div>

            @if (!isCollapsed()) {
            <div class="flex-1 min-w-0 flex flex-col relative z-10">
                <span
                    class="text-sm font-bold text-slate-800 dark:text-slate-200 truncate group-hover:text-purple-600 transition-colors">{{
                    store.user()?.fullName }}</span>
                <span class="text-[10px] font-medium text-slate-400 truncate">{{ store.user()?.role || 'User' }}</span>
            </div>

            <button (click)="store.logout()"
                class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all">
                <i class="pi pi-sign-out text-sm"></i>
            </button>
            }
        </div>
    </div>

</div>
