# =============================================================
# docker-compose.yml
# Run from the project root: docker-compose up --build
#
# Services:
#   db       — SQL Server (Linux Container)
#   redis    — message broker for Celery
#   api      — FastAPI (uvicorn)
#   worker   — Celery worker
#   flower   — Celery monitoring UI  (http://localhost:5555)
#   frontend — Angular dev server    (http://localhost:4200)
#
# Option A: fully containerized, isolated setup.
# =============================================================

services:

  # ── SQL Server ───────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: summary_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd!
      - MSSQL_PID=Developer
    networks:
      - summary_network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong@Passw0rd!", "-Q", "SELECT 1", "-C", "-No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: summary_redis
    networks:
      - summary_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI ───────────────────────────────────────────────
  api:
    build:
      context: ./FastApiBoilerplate
      dockerfile: backend.Dockerfile
    container_name: summary_api
    # Runs init to create the database, then alembic migrations, then the server
    command: /bin/bash -c "python src/init_db.py && alembic upgrade head && python -c 'from src.init_db import seed_admin; seed_admin()' && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./FastApiBoilerplate/src:/app/src
      - ./FastApiBoilerplate/storage:/app/storage
      - ./FastApiBoilerplate/alembic.ini:/app/alembic.ini
      - ./FastApiBoilerplate/alembic:/app/alembic
    env_file:
      - ./FastApiBoilerplate/.env
    environment:
      - DATABASE_URL=mssql+pyodbc://sa:YourStrong%40Passw0rd!@db:1433/FastApiDb?driver=ODBC+Driver+18+for+SQL+Server&Encrypt=no
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - summary_network

  # ── Celery Worker ─────────────────────────────────────────
  worker:
    build:
      context: ./FastApiBoilerplate
      dockerfile: backend.Dockerfile
    container_name: summary_worker
    command: celery -A src.core.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./FastApiBoilerplate/src:/app/src
      - ./FastApiBoilerplate/storage:/app/storage
    env_file:
      - ./FastApiBoilerplate/.env
    environment:
      - DATABASE_URL=mssql+pyodbc://sa:YourStrong%40Passw0rd!@db:1433/FastApiDb?driver=ODBC+Driver+18+for+SQL+Server&Encrypt=no
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - summary_network

  # ── Celery Flower (monitoring UI) ─────────────────────────
  flower:
    build:
      context: ./FastApiBoilerplate
      dockerfile: backend.Dockerfile
    container_name: summary_flower
    command: celery -A src.core.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - ./FastApiBoilerplate/.env
    environment:
      - DATABASE_URL=mssql+pyodbc://sa:YourStrong%40Passw0rd!@db:1433/FastApiDb?driver=ODBC+Driver+18+for+SQL+Server&Encrypt=no
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - summary_network

  # ── Angular Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./Angular-Boilerplate
      dockerfile: frontend.Dockerfile
    container_name: summary_frontend
    ports:
      - "4200:4200"
    volumes:
      - ./Angular-Boilerplate/src:/app/src
    depends_on:
      - api
    networks:
      - summary_network

networks:
  summary_network:
    driver: bridge
